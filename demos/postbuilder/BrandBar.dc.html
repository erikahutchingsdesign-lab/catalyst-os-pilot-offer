<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
</helmet>
<sc-if value="{{ show }}" hint-placeholder-val="{{ true }}">

  <!-- ===== COS (CatalystOS) chrome ===== -->
  <sc-if value="{{ isCos }}" hint-placeholder-val="{{ true }}">
  <div style="width:100%; background:radial-gradient(120% 180% at 50% -40%, #12296f 0%, #081A53 60%); border-bottom:2px solid; border-image:linear-gradient(90deg,#1921FE,#6818F8,#C1229C,#FD5920,#FDA71A) 1; padding:9px 20px; display:flex; align-items:center; justify-content:center; gap:11px; font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
    <span style="width:25px; height:25px; border-radius:8px; background:linear-gradient(135deg,#1921FE,#6818F8 38%,#C1229C 64%,#FD5920 84%,#FDA71A); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; letter-spacing:-0.02em; color:#fff; flex:none; box-shadow:0 3px 10px rgba(105,24,248,0.5), inset 0 1px 0 rgba(255,255,255,0.28);">OS</span>
    <span style="font-size:10.5px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:#8b95c4;">Powered by</span>
    <span style="font-size:14px; font-weight:700; letter-spacing:-0.01em; color:#fff;">Catalyst<span style="background:linear-gradient(90deg,#6818F8,#C1229C 50%,#FD7715); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">OS</span></span>
  </div>
  </sc-if>

  <!-- ===== Havener Capital Chrome ===== -->
  <sc-if value="{{ isHavener }}" hint-placeholder-val="{{ false }}">
  <div style="width:100%; background:#141414; border-bottom:1px solid #2a2a2a; padding:9px 20px; display:flex; align-items:center; justify-content:center; gap:8px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
    <span style="font-size:11px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:#b9a876;">Powered by</span>
    <span style="font-size:13px; font-weight:700; color:#F2E9D5;">{{ org }}</span>
  </div>
  </sc-if>

</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:40},&quot;org&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    // Paint immediately with prop override or fallback; central config refines on mount.
    this.state = { org: props.org || "Havener Capital Partners", show: true, chrome: props.chrome || "cos" };
  }
  componentDidMount(){ this._loadCentral(); }
  async _loadCentral(){
    try{
      // cache-bust so edits to the config are always picked up on reload
      const m = await import("./brand-bar-config.js?v=" + Date.now());
      const c = (m && (m.brandBar || m.default)) || {};
      this.setState({
        // An explicit per-app prop wins; otherwise the central file controls it.
        org: this.props.org || c.org || "Havener Capital Partners",
        chrome: this.props.chrome || c.chrome || "cos",
        show: c.show !== false,
      });
    }catch(e){ /* config missing — keep fallback */ }
  }
  renderVals(){
    const chrome = (this.state.chrome || "cos").toLowerCase();
    return {
      org: this.state.org,
      show: this.state.show,
      isCos: chrome === "cos",
      isHavener: chrome === "havener",
    };
  }
}
</script>
</body>
</html>
