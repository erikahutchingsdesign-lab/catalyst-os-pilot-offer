<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  @keyframes cosRipple { 0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0.55; } 100% { transform: translate(-50%,-50%) scale(1); opacity: 0; } }
</style>
</helmet>

<div style="width: 1440px; min-height: 1000px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0 70px; font-family: 'Inter', system-ui, sans-serif; background: radial-gradient(1500px 820px at 50% -12%, #262b35 0%, #14171d 52%, #0a0b0e 100%);">

  <div style="position: relative; display: flex; flex-direction: column; align-items: center;">

    <!-- Lid -->
    <div style="position: relative; width: 1244px; padding: 16px 16px 18px; border-radius: 22px 22px 8px 8px; background: linear-gradient(180deg, #1b1d22 0%, #0c0d10 100%); box-shadow: 0 2px 0 rgba(255,255,255,0.06) inset, 0 60px 100px -40px rgba(0,0,0,0.75), 0 30px 60px -30px rgba(0,0,0,0.6);">
      <!-- camera -->
      <div style="position: absolute; top: 7px; left: 50%; transform: translateX(-50%); width: 7px; height: 7px; border-radius: 50%; background: #24262b; box-shadow: 0 0 0 1.5px #101216, inset 0 0 2px rgba(120,180,255,0.5);"></div>

      <!-- Screen viewport -->
      <div style="position: relative; width: 1212px; height: 758px; overflow: hidden; border-radius: 6px; background: #F5F7FA; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);">
        <iframe ref="{{ refFrame }}" src="app/Western%20Alternatives/Webinar%20Graphics%20Builder%20-%20COS.html" title="Event Graphics Builder" style="display: block; width: 1212px; height: 758px; border: 0;"></iframe>

        <!-- caption chip -->
        <div ref="{{ refCaption }}" style="position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(14px); opacity: 0; transition: opacity .4s ease, transform .4s ease; pointer-events: none; z-index: 40; display: flex; align-items: center; gap: 10px; padding: 11px 18px; border-radius: 999px; background: rgba(8,12,26,0.86); backdrop-filter: blur(8px); color: #fff; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.01em; box-shadow: 0 14px 34px -12px rgba(0,0,0,0.6);">
          <span style="width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(120deg,#6818F8,#FD5920); flex: none;"></span>
          <span ref="{{ refCaptionText }}">Live demo</span>
        </div>

        <!-- click ripple -->
        <div ref="{{ refRipple }}" style="position: absolute; top: 0; left: 0; width: 46px; height: 46px; border-radius: 50%; border: 2px solid rgba(104,24,248,0.9); background: rgba(104,24,248,0.14); pointer-events: none; z-index: 44; opacity: 0; transform: translate(-50%,-50%) scale(0.3);"></div>

        <!-- cursor -->
        <div ref="{{ refCursor }}" style="position: absolute; top: 0; left: 0; z-index: 45; pointer-events: none; opacity: 0; transition: opacity .3s ease; will-change: transform; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.4));">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" style="display:block;">
            <path d="M4 2 L4 20 L9 15.5 L12.5 22.5 L15.5 21 L12 14 L19 14 Z" fill="#ffffff" stroke="#1a1d24" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Hinge + base -->
    <div style="position: relative; width: 1244px; height: 14px; background: linear-gradient(180deg, #0a0b0e 0%, #17191e 100%); border-radius: 0 0 4px 4px;"></div>
    <div style="position: relative; width: 1360px; height: 24px; border-radius: 0 0 16px 16px; background: linear-gradient(180deg, #b9bec7 0%, #8c919b 46%, #6d7079 100%); box-shadow: 0 26px 44px -18px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.5);">
      <div style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 12px; border-radius: 0 0 12px 12px; background: linear-gradient(180deg, #6a6d76, #83868f);"></div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      refFrame: (el) => { this.frameEl = el; },
      refCursor: (el) => { this.cursorEl = el; },
      refRipple: (el) => { this.rippleEl = el; },
      refCaption: (el) => { this.captionEl = el; },
      refCaptionText: (el) => { this.captionTextEl = el; },
    };
  }

  componentDidMount() {
    this._alive = true;
    this.cur = { x: 606, y: 379 };
    this._pauseUntil = 0;
    this._boot();
  }

  componentWillUnmount() { this._alive = false; }

  sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async _boot() {
    // wait for iframe + inner app ready
    const t0 = Date.now();
    while (this._alive && Date.now() - t0 < 20000) {
      try {
        const doc = this.frameEl && this.frameEl.contentDocument;
        if (doc && doc.getElementById('dl_dd_toggle') && doc.querySelector('.panel') && doc.getElementById('spk_count')) {
          this.idoc = doc;
          break;
        }
      } catch (e) {}
      await this.sleep(200);
    }
    if (!this.idoc) return;
    // pause the demo when the user interacts for real
    try {
      this.idoc.addEventListener('pointerdown', (e) => { if (e.isTrusted) this._pauseUntil = Date.now() + 14000; }, true);
      this.idoc.addEventListener('keydown', (e) => { if (e.isTrusted) this._pauseUntil = Date.now() + 14000; }, true);
    } catch (e) {}
    await this.sleep(1200);
    this.cursorEl.style.opacity = '1';
    while (this._alive) {
      try { await this._runOnce(); } catch (e) { await this.sleep(1500); }
      await this._idle(1600);
    }
  }

  // ── pause gate ──
  async _idle(ms) {
    await this.sleep(ms);
    while (this._alive && Date.now() < this._pauseUntil) {
      this._caption('You’re in control — resuming shortly…');
      await this.sleep(600);
    }
  }

  // ── caption ──
  _caption(txt) {
    if (!this.captionEl) return;
    if (this.captionTextEl) this.captionTextEl.textContent = txt;
    this.captionEl.style.opacity = '1';
    this.captionEl.style.transform = 'translateX(-50%) translateY(0)';
  }
  _hideCaption() {
    if (!this.captionEl) return;
    this.captionEl.style.opacity = '0';
    this.captionEl.style.transform = 'translateX(-50%) translateY(14px)';
  }

  // ── geometry: inner-doc rect maps 1:1 into the screen container ──
  _center(el) {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  async _scrollTo(el, pad = 150) {
    const panel = this.idoc.querySelector('.panel');
    if (!panel || !el) return;
    const pr = panel.getBoundingClientRect();
    const er = el.getBoundingClientRect();
    const target = panel.scrollTop + (er.top - pr.top) - pad;
    const from = panel.scrollTop;
    const delta = target - from;
    if (Math.abs(delta) < 4) return;
    const dur = 520, t0 = performance.now();
    await new Promise(res => {
      const step = (t) => {
        const p = Math.min(1, (t - t0) / dur);
        const e = 1 - Math.pow(1 - p, 3);
        panel.scrollTop = from + delta * e;
        if (p < 1 && this._alive) requestAnimationFrame(step); else res();
      };
      requestAnimationFrame(step);
    });
    await this.sleep(120);
  }

  async _move(x, y, dur = 620) {
    const from = { ...this.cur }, t0 = performance.now();
    await new Promise(res => {
      const step = (t) => {
        const p = Math.min(1, (t - t0) / dur);
        const e = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
        this.cur.x = from.x + (x - from.x) * e;
        this.cur.y = from.y + (y - from.y) * e;
        this.cursorEl.style.transform = `translate(${this.cur.x}px, ${this.cur.y}px)`;
        if (p < 1 && this._alive) requestAnimationFrame(step); else res();
      };
      requestAnimationFrame(step);
    });
  }

  _ripple() {
    const r = this.rippleEl;
    r.style.left = this.cur.x + 'px';
    r.style.top = this.cur.y + 'px';
    r.style.animation = 'none';
    void r.offsetWidth;
    r.style.animation = 'cosRipple .5s ease-out';
  }

  async _moveToEl(el) {
    if (!el) return;
    const c = this._center(el);
    await this._move(c.x, c.y);
  }

  async _click(el) {
    await this._moveToEl(el);
    this._ripple();
    await this.sleep(120);
    if (el) el.click();
    await this.sleep(360);
  }

  async _type(el, text, per = 42) {
    if (!el) return;
    await this._moveToEl(el);
    this._ripple();
    el.focus();
    el.value = '';
    el.dispatchEvent(new Event('input', { bubbles: true }));
    await this.sleep(220);
    for (let i = 1; i <= text.length && this._alive; i++) {
      el.value = text.slice(0, i);
      el.dispatchEvent(new Event('input', { bubbles: true }));
      await this.sleep(per);
    }
    await this.sleep(300);
  }

  async _select(el, val) {
    if (!el) return;
    await this._moveToEl(el);
    this._ripple();
    el.value = val;
    el.dispatchEvent(new Event('change', { bubbles: true }));
    el.dispatchEvent(new Event('input', { bubbles: true }));
    await this.sleep(360);
  }

  async _range(el, val) {
    if (!el) return;
    await this._moveToEl(el);
    this._ripple();
    const from = +el.value || 0, dur = 520, t0 = performance.now();
    await new Promise(res => {
      const step = (t) => {
        const p = Math.min(1, (t - t0) / dur);
        el.value = Math.round(from + (val - from) * p);
        el.dispatchEvent(new Event('input', { bubbles: true }));
        if (p < 1 && this._alive) requestAnimationFrame(step); else res();
      };
      requestAnimationFrame(step);
    });
    await this.sleep(300);
  }

  _q(sel) { return this.idoc.querySelector(sel); }
  _qa(sel) { return [...this.idoc.querySelectorAll(sel)]; }

  async _runOnce() {
    const d = this.idoc;

    // ── 1. Download picker ──
    await this._scrollTo(d.getElementById('dl_dd_toggle'), 40);
    this._caption('Pick which graphics to export');
    await this._click(d.getElementById('dl_dd_toggle'));
    await this.sleep(500);

    this._caption('Clear the selection…');
    const all = d.getElementById('dl_all');
    if (all && all.checked) await this._click(all);           // uncheck all
    await this.sleep(400);

    this._caption('…then choose just the ones you need');
    const cbs = this._qa('.dl-cb');
    for (const i of [0, 4, 5]) { if (cbs[i]) await this._click(cbs[i]); }
    await this.sleep(500);

    // fake the download press (no real file generated during the demo)
    this._caption('Download Selected');
    const btn = d.getElementById('export_png');
    await this._moveToEl(btn);
    this._ripple();
    const orig = btn.textContent;
    btn.style.transform = 'scale(0.97)';
    await this.sleep(220); btn.style.transform = '';
    btn.textContent = 'Rendering…'; await this.sleep(900);
    btn.textContent = 'Zipping…'; await this.sleep(750);
    btn.textContent = '✓ Downloaded'; await this.sleep(1100);
    btn.textContent = orig;

    // restore all + close dropdown
    if (all && !all.checked) await this._click(all);
    await this._click(d.getElementById('dl_dd_toggle'));
    await this._idle(700);

    // ── 2. Title ──
    await this._scrollTo(d.getElementById('f_title_l1'), 90);
    this._caption('Edit the headline');
    await this._type(d.getElementById('f_title_l1'), 'Scaling Advisory Into {Recurring Revenue}', 38);
    this._caption('Nudge the title size');
    await this._click(d.getElementById('f_title_inc'));
    await this._click(d.getElementById('f_title_inc'));
    await this.sleep(500);
    await this._click(d.getElementById('f_title_reset'));
    await this._idle(700);

    // ── 3. Date & time ──
    await this._scrollTo(d.getElementById('f_date'), 90);
    this._caption('Set the date & time');
    await this._type(d.getElementById('f_date'), 'December 3', 44);
    await this._type(d.getElementById('f_time'), '11:30', 60);
    await this._select(d.getElementById('f_ampm'), 'AM');
    await this._type(d.getElementById('f_tz'), 'PT', 70);
    await this._idle(700);

    // ── 4. Backgrounds ──
    const acc = d.getElementById('bg_accordion');
    const firstItem = acc && acc.querySelector('.bg-item');
    if (firstItem) {
      await this._scrollTo(firstItem, 70);
      this._caption('Style each background');
      await this._click(firstItem.querySelector('.bg-item-head'));   // expand
      await this.sleep(400);
      this._caption('Change the base color');
      const sw = firstItem.querySelectorAll('.bg-colors .swatch');
      if (sw[2]) await this._click(sw[2]);                            // violet
      this._caption('Swap the background image');
      const thumbs = firstItem.querySelectorAll('.bg-thumb');
      if (thumbs[4]) await this._click(thumbs[4]);
      this._caption('Dial in the opacity');
      const op = firstItem.querySelector('.bg-op');
      if (op) { await this._range(op, 78); await this.sleep(300); await this._range(op, 40); }
      await this._click(firstItem.querySelector('.bg-item-head'));    // collapse
    }
    await this._idle(700);

    // ── 5. Speakers ──
    await this._scrollTo(d.getElementById('spk_count'), 90);
    this._caption('Change the number of speakers');
    const opts = this._qa('#spk_count .spk-opt');
    const byN = (n) => opts.find(b => b.dataset.n === String(n));
    if (byN(4)) await this._click(byN(4));   // 4 up → four faces
    await this.sleep(700);
    if (byN(2)) await this._click(byN(2));   // down to two
    await this.sleep(500);

    this._caption('Rename a speaker');
    await this._scrollTo(d.getElementById('f_s1_name'), 110);
    await this._type(d.getElementById('f_s1_name'), 'Dr. Elena Ruiz', 46);
    await this._type(d.getElementById('f_s1_title'), 'Managing Partner, Western Advisory', 30);
    await this._idle(700);

    this._caption('Every graphic updates instantly');
    await this.sleep(1800);
    this._hideCaption();
    await this._scrollTo(d.getElementById('dl_dd_toggle'), 40);
  }
}
</script>
</body>
</html>
