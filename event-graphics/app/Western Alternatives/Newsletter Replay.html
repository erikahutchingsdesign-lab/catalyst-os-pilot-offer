<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Western Alternatives — Newsletter Replay</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  @font-face{font-family:'IvyPresto Headline';src:url('assets/fonts/IvyprestoHeadline-Light.otf') format('opentype');font-weight:300 500;font-style:normal;font-display:swap;}
  @font-face{font-family:'IvyPresto Headline';src:url('assets/fonts/IvyprestoHeadline-LightItalic.otf') format('opentype');font-weight:300 500;font-style:italic;font-display:swap;}
  @font-face{font-family:'Arpona Sans';src:url('assets/fonts/ArponaSans-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
  @font-face{font-family:'Arpona Sans';src:url('assets/fonts/ArponaSans-SemiBold.otf') format('opentype');font-weight:500 700;font-style:normal;font-display:swap;}
  :root{
    --cloud:#F7F8F6; --onyx:#081A53; --strata:#989486;
    --limestone:#E3DED2; --horizon:#6B8FA1; --sand:#FCE5BD; --sienna:#5C412F;
    --serif:'Manrope','Inter',system-ui,sans-serif;
    --sans:'Inter',system-ui,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0a0908;color:var(--cloud);font-family:var(--sans);overflow:hidden;}
  .stage{position:fixed;inset:0;display:grid;place-items:center;background:#0a0908;}
  .frame{
    position:relative;width:600px;height:400px;
    transform-origin:center center;
    background:var(--onyx);overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,.6);
  }
  /* Full-bleed canyon, low opacity */
  .bgfull{position:absolute;inset:0;z-index:0;overflow:hidden;opacity:.5;}
  .bgfull img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:none;}
  .frame::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background:
      radial-gradient(120% 90% at 80% 0%, rgba(107,143,161,.12), transparent 55%),
      radial-gradient(90% 70% at 0% 100%, rgba(131,118,98,.10), transparent 60%);
  }

  /* Centered content column */
  .col{
    position:absolute;inset:0;z-index:5;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px 36px;gap:0;
  }

  /* LIVE WEBINAR pill */
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--sans);font-weight:600;
    font-size:11px;letter-spacing:.26em;text-transform:uppercase;white-space:nowrap;
    color:var(--onyx);background:var(--sand);
    padding:7px 16px 6px;border-radius:999px;
  }
  .eyebrow .dot{width:5px;height:5px;background:var(--sienna);border-radius:50%;}

  /* Oversized replay button */
  .replay{
    display:flex;flex-direction:column;align-items:center;gap:13px;
    background:none;border:0;cursor:pointer;padding:0;color:inherit;
  }
  .replay .ring{
    width:108px;height:108px;border-radius:50%;
    display:grid;place-items:center;
    background:var(--cloud);color:var(--onyx);
    box-shadow:0 0 0 8px rgba(247,248,246,.12), 0 18px 40px rgba(0,0,0,.4);
    transition:transform .25s ease;
  }
  .replay:hover .ring{transform:scale(1.05);}
  .replay .ring svg{width:64px;height:64px;display:block;}

  /* Webinar title */
  .title{
    font-family:var(--serif);font-weight:700;
    font-size:40px;line-height:1.02;letter-spacing:.008em;color:var(--cloud);
    text-wrap:pretty;max-width:520px;margin-top:26px;
  }

  /* Date / Time band */
  .when{
    margin-top:20px;
    padding:10px 0 11px;
    border-top:1px solid rgba(227,222,210,.28);
    border-bottom:1px solid rgba(227,222,210,.28);
    display:inline-grid;grid-template-columns:auto 1px auto;
    align-items:center;gap:24px;justify-content:center;
  }
  .when .label{
    font-family:var(--sans);font-weight:600;
    font-size:9px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--horizon);margin-bottom:5px;
  }
  .when .date{
    font-family:var(--serif);font-weight:700;font-style:italic;
    font-size:26px;line-height:1;color:var(--cloud);letter-spacing:-.01em;white-space:nowrap;
  }
  .when .date .num{font-style:normal;}
  .when .divider{width:1px;height:34px;background:rgba(227,222,210,.3);}
  .when .time{
    font-family:var(--serif);font-weight:700;
    font-size:26px;line-height:1;color:var(--cloud);letter-spacing:-.01em;white-space:nowrap;
  }
  .when .time .tz{font-weight:400;font-size:26px;letter-spacing:-.01em;color:var(--cloud);margin-left:7px;}

  /* Three faces, no names */
  .faces{display:flex;justify-content:center;gap:18px;margin-top:24px;}
  .portrait{
    width:74px;height:74px;border-radius:50%;overflow:hidden;
    border:2px solid var(--limestone);background:#222;
    box-shadow:0 0 0 4px rgba(227,222,210,.06);
  }
  .portrait img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.9) contrast(1.02);}
  .portrait.right img{object-position:50% 22%;transform:scale(1.26);transform-origin:50% 26%;}
  .portrait.jeff img{transform:scale(1.18);transform-origin:50% 30%;}
  .portrait.loic img{transform:scale(1.32);transform-origin:50% 22%;}

  /* ── CatalystOS logo + CTA overrides ── */
  .logo .lockup{-webkit-mask:none!important;mask:none!important;background-color:transparent!important;
    background-image:url('assets/catalystos-logo.png')!important;background-repeat:no-repeat!important;
    background-position:left center!important;background-size:contain!important;width:auto!important;aspect-ratio:2.29!important;}
  .clogo{-webkit-mask:none!important;mask:none!important;background-color:transparent!important;
    background-image:url('assets/catalystos-logo.png')!important;background-repeat:no-repeat!important;
    background-position:center!important;background-size:contain!important;width:auto!important;aspect-ratio:2.29!important;}
  .ccbtn{background:linear-gradient(160deg,#9B5CFF 0%,#6818F8 100%)!important;color:#fff!important;
    border-radius:999px!important;border:0!important;
    box-shadow:0 24px 70px -12px rgba(104,24,248,.65),0 4px 14px rgba(104,24,248,.40)!important;}
  .ccbtn .ar{color:#fff!important;}
  /* ── CatalystOS eyebrow (gradient pill) ── */
  .eyebrow{background:linear-gradient(120deg,#4A54C8 0%,#7856BE 34%,#A65C93 62%,#C0785A 84%,#C79A55 100%)!important;
    background-image:linear-gradient(120deg,#4A54C8 0%,#7856BE 34%,#A65C93 62%,#C0785A 84%,#C79A55 100%)!important;
    -webkit-background-clip:border-box!important;background-clip:border-box!important;
    -webkit-text-fill-color:#fff!important;color:#fff!important;
    border:0!important;border-radius:999px!important;
    text-shadow:0 1px 1px rgba(8,10,40,.28)!important;
    box-shadow:0 8px 22px -12px rgba(104,24,248,.4)!important;
    font-family:'Manrope',system-ui,sans-serif!important;font-weight:800!important;letter-spacing:.22em!important;text-transform:uppercase!important;}
  .eyebrow .dot{display:inline-block!important;background:#fff!important;box-shadow:0 0 8px rgba(255,255,255,.85)!important;}
  /* Date & Time band labels gold */
  .when .label{color:#FDA71A!important;}
</style>
</head>
<body>
  <div class="stage">
    <div class="frame" id="frame" data-screen-label="Newsletter Replay">
      <div class="bgfull"><img src="assets/cos-tex-aurora.png" alt="" /></div>

      <div class="col">
        <button class="replay" type="button" aria-label="Watch the replay">
          <span class="ring"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5.5v13l11-6.5z"></path></svg></span>
        </button>

        <h1 class="title" data-field="title">From Deliverables to Recurring Revenue</h1>

        <div class="faces">
          <div class="portrait jeff"><img src="assets/cos-alex.png" alt="" /></div>
          <div class="portrait right"><img src="assets/cos-sarah.png" alt="" /></div>
          <div class="portrait loic"><img src="assets/cos-jordan.png" alt="" /></div>
          <div class="portrait" style="display:none"><img src="assets/cos-jordan.png" alt="" /></div>
        </div>
      </div>
    </div>
  </div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#1D1A1B"/>
      <circle cx="50" cy="42" r="22" fill="#F7F8F6"/>
      <path d="M44 32 L44 52 L61 42 Z" fill="#1D1A1B"/>
    </svg>
  </template>

  <!-- Auto-scale stage to viewport -->
  <script>
    (function(){
      const frame = document.getElementById('frame');
      const W = 600, H = 400;
      function fit(){
        const vw = window.innerWidth, vh = window.innerHeight;
        const s = Math.min(vw / W, vh / H);
        frame.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>

  <!-- Builder live-update listener -->
  <script>
  (function(){
    function setHtml(sel, html){ document.querySelectorAll(sel).forEach(el=>{ el.innerHTML = html; }); }
    function setText(sel, val){ document.querySelectorAll(sel).forEach(el=>{ el.textContent = val||''; }); }
    function setBg(url){ ['#photoImg','.photo img','.bgfull img'].forEach(function(s){ document.querySelectorAll(s).forEach(function(img){ img.src=url; }); }); }
    function setPortrait(idx, url){
      const ports = document.querySelectorAll('.faces .portrait');
      const p = ports[idx]; if (!p) return;
      p.innerHTML = '<img src="'+url+'" />';
    }
    window.addEventListener('message', e=>{
      const d = e.data; if (!d || d.kind !== 'webinar-update') return;
      if (d.bgColor){ ['.frame','.photo','.bgfull'].forEach(function(sel){ var el=document.querySelector(sel); if(el) el.style.backgroundColor=d.bgColor; }); }
      if (d.bgOpacity!=null){ ['.photo','.bgfull'].forEach(function(sel){ var el=document.querySelector(sel); if(el) el.style.opacity=d.bgOpacity; }); }
      if (d.title) setHtml('[data-field="title"]', d.title);
      if (d.titleScale != null){ const t=document.querySelector('[data-field="title"]'); if(t){ if(!t.dataset.baseFontSize){ t.dataset.baseFontSize = parseFloat(getComputedStyle(t).fontSize); } if (d.titleScale === 1){ t.style.removeProperty('font-size'); } else { t.style.fontSize = (parseFloat(t.dataset.baseFontSize) * d.titleScale) + 'px'; } } }
      if (d.eyebrow != null) setText('[data-field="eyebrow"]', d.eyebrow);
      if (d.date != null) setHtml('[data-field="date"]', '<span class="num">'+String(d.date).replace(/ /g,'&nbsp;')+'</span>');
      if (d.time != null) setHtml('[data-field="time"]', d.time);
      if (d.bg) setBg(d.bg);
      if (d.s1Photo) setPortrait(0, d.s1Photo);
      if (d.s2Photo) setPortrait(1, d.s2Photo);
      if (d.s3Photo) setPortrait(2, d.s3Photo);
      if (d.speakerCount != null){ document.querySelectorAll('.faces .portrait').forEach((el,i)=>{ el.style.display = (i < d.speakerCount) ? '' : 'none'; }); }
    });
    window.parent && window.parent.postMessage({kind:'webinar-ready'}, '*');
  })();
  </script>
</body>
</html>
