  :root{
    --cloud:#F7F8F6;
    --onyx:#081A53;
    --taupe:#837662;
    --strata:#989486;
    --limestone:#E3DED2;
    --horizon:#6B8FA1;
    --cream:#F0EFE5;
    --sand:#FCE5BD;
    --moss:#D9D7BF;
    --sienna:#5C412F;
    --serif:'Manrope','Inter',system-ui,sans-serif;
    --sans:'Inter',system-ui,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0a0908;color:var(--cloud);font-family:var(--sans);overflow:hidden;}

  /* Stage scaling: 1920×1080 always fits the viewport, letterboxed black */
  .stage{position:fixed;inset:0;display:grid;place-items:center;background:#0a0908;}
  .frame{
    position:relative;width:1200px;height:627px;
    transform-origin:center center;
    background:var(--onyx);
    overflow:hidden;
    box-shadow:0 40px 120px rgba(0,0,0,.6);
  }

  /* ───── Composition ───── */
  .frame::before{
    /* subtle vignette texture for depth */
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(120% 90% at 80% 0%, rgba(107,143,161,.12), transparent 55%),
      radial-gradient(90% 70% at 0% 100%, rgba(131,118,98,.10), transparent 60%);
    z-index:1;
  }

  /* Photography panel — full bleed B&W canyon */
  .photo{
    position:absolute;inset:0;
    background:#111;
    overflow:hidden;
    z-index:0;
    opacity:.10;
  }
  .photo img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    filter:grayscale(1) contrast(1.05);
  }
  .photo::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(90deg, rgba(29,26,27,.4) 0%, rgba(29,26,27,0) 50%, rgba(29,26,27,.4) 100%);
  }

  /* ───── Header row ───── */
  .header{
    position:absolute;top:64px;left:88px;right:88px;
    display:flex;align-items:center;justify-content:space-between;
    z-index:5;
  }
  .logo{display:none !important;align-items:center;color:var(--cloud);}

  .eyebrow{
    display:inline-flex;align-items:center;gap:12px;
    font-family:var(--sans);font-weight:600;
    font-size:22px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--onyx);
    background:var(--sand);
    padding:14px 28px 13px;
    border-radius:999px;
  }
  .eyebrow .dot{width:10px;height:10px;background:var(--sienna);border-radius:50%;}

  /* ───── Title ───── */
  .title-wrap{
    position:absolute;left:0;right:0;top:188px;padding:0 120px;text-align:center;
    z-index:5;
  }
  .kicker{
    font-family:var(--sans);font-weight:500;
    font-size:17px;letter-spacing:.36em;text-transform:uppercase;
    color:var(--limestone);opacity:.85;
    display:flex;align-items:center;gap:18px;margin-bottom:28px;
  }
  .kicker .rule{flex:0 0 56px;height:1px;background:var(--limestone);opacity:.55;}
  .title{
    font-family:var(--serif);font-weight:700;
    font-size:132px;line-height:1.02;letter-spacing:.008em;
    color:var(--cloud);
    text-wrap:pretty;
  }
  .subtext{
    font-family:var(--sans);font-weight:400;
    font-size:44px;line-height:1.35;letter-spacing:.005em;
    color:var(--limestone);
    max-width:1320px;margin:32px auto 0;
    text-wrap:pretty;
  }
  .title .it{font-style:italic;color:var(--limestone);}
  .title .quote{font-style:italic;color:var(--strata);font-weight:400;}

  /* ───── Date/Time band — prominent, between title and speakers ───── */
  .when{
    position:absolute;left:50%;transform:translateX(-50%);width:max-content;max-width:900px;top:48px;
    z-index:5;
    padding:34px 0 36px;
    border-top:1px solid rgba(227,222,210,.28);
    border-bottom:1px solid rgba(227,222,210,.28);
    display:grid;grid-template-columns:auto 1px auto;
    align-items:center;gap:52px;justify-content:center;
  }
  .when .label{
    text-align:center;
    font-family:var(--sans);font-weight:600;
    font-size:32px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--horizon);
  }
  .when .date{
    white-space:nowrap;
    font-family:var(--serif);font-weight:700;font-style:italic;
    font-size:78px;line-height:1;color:var(--cloud);letter-spacing:-.01em;
  }
  .when .date .num{font-style:normal;}
  .when .divider{width:1px;height:78px;background:rgba(227,222,210,.3);}
  .when .time{
    white-space:nowrap;
    font-family:var(--serif);font-weight:700;
    font-size:78px;line-height:1;color:var(--cloud);letter-spacing:-.01em;
  }
  .when .time .tz{
    font-weight:400;font-size:78px;letter-spacing:-.01em;
    color:var(--cloud);margin-left:18px;
  }
  .when .meta{
    justify-self:end;
    font-family:var(--sans);font-weight:500;font-size:16px;letter-spacing:.32em;
    text-transform:uppercase;color:var(--limestone);opacity:.8;
    text-align:right;line-height:1.6;
  }

  /* ───── Speakers — right column, stacked vertically ───── */
  .speakers{
    position:absolute;left:88px;right:88px;top:510px;
    display:flex;flex-direction:row;justify-content:space-between;align-items:flex-start;gap:36px;
    z-index:5;
  }
  .speaker{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;}
  .portrait{
    width:150px;height:150px;border-radius:50%;
    overflow:hidden;
    border:4px solid var(--limestone);
    background:#222;
    box-shadow:0 0 0 8px rgba(227,222,210,.06);
  }
  .portrait img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.9) contrast(1.02);}
  .portrait.right img{object-position:50% 28%;}
  .speaker .role{display:none !important;}
  .speaker .name{
    font-family:var(--serif);font-weight:700;
    font-size:54px;line-height:1.08;color:var(--cloud);letter-spacing:-.005em;
    margin-bottom:8px;
  }
  .speaker .name .cred{display:block;font-size:30px;line-height:1.15;color:var(--cloud);opacity:.92;margin-top:4px;}
  .speaker .title-line{
    font-family:var(--sans);font-weight:400;
    font-size:30px;line-height:1.3;color:var(--limestone);max-width:560px;
    max-width:380px;
  }

  /* ───── Footer ───── */
  .footer{
    position:absolute;bottom:48px;left:88px;right:88px;
    display:flex;align-items:center;justify-content:space-between;
    font-family:var(--sans);font-weight:500;font-size:16px;letter-spacing:.3em;
    text-transform:uppercase;color:var(--strata);opacity:.75;
    z-index:5;
  }
  .footer .seal{
    width:32px;height:32px;border-radius:50%;border:1px solid var(--strata);
    display:grid;place-items:center;
    font-family:var(--serif);font-style:italic;font-size:14px;letter-spacing:0;
    color:var(--strata);
  }
  .footer-right{display:flex;align-items:center;gap:16px;}

  /* ───── Subtle strata accent at top ───── */
  .accent-bar{
    position:absolute;left:0;right:0;top:0;height:4px;
    background:linear-gradient(90deg, var(--taupe) 0%, var(--strata) 28%, var(--limestone) 55%, var(--horizon) 82%, var(--sienna) 100%);
    opacity:.7;z-index:6;
  }

  /* ───── Tweaks panel hidden by default ───── */
  .tweaks-mount{position:fixed;z-index:100;}

  .cc-scaler{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0.46875);transform-origin:center center;width:1920px;height:1080px;}
  .ccbtn{position:absolute;left:50%;transform:translateX(-50%);top:760px;z-index:6;display:inline-flex;align-items:center;gap:26px;background:var(--sand);color:var(--onyx);font-family:var(--sans);font-weight:700;font-size:72px;letter-spacing:.05em;text-transform:uppercase;padding:42px 92px;border-radius:16px;text-decoration:none;white-space:nowrap;}
  .ccbtn .ar{font-size:72px;line-height:1;}

  .bgfull{position:absolute;inset:0;z-index:0;overflow:hidden;opacity:.5;}
  .bgfull img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:none;}
  .cc-scaler .photo{display:none !important;}

  /* ── CatalystOS logo + CTA overrides ── */
  .logo .lockup{-webkit-mask:none!important;mask:none!important;background-color:transparent!important;
    background-image:url('assets/catalystos-logo.png')!important;background-repeat:no-repeat!important;
    background-position:left center!important;background-size:contain!important;width:auto!important;aspect-ratio:2.29!important;}
  .clogo{-webkit-mask:none!important;mask:none!important;background-color:transparent!important;
    background-image:url('assets/catalystos-logo.png')!important;background-repeat:no-repeat!important;
    background-position:center!important;background-size:contain!important;width:auto!important;aspect-ratio:2.29!important;}
  .ccbtn{background:linear-gradient(160deg,#9B5CFF 0%,#6818F8 100%)!important;color:#fff!important;
    border-radius:999px!important;border:0!important;
    box-shadow:0 24px 70px -12px rgba(104,24,248,.65),0 4px 14px rgba(104,24,248,.40)!important;}
  .ccbtn .ar{color:#fff!important;}
  /* ── CatalystOS eyebrow (gradient pill) ── */
  .eyebrow{background:linear-gradient(120deg,#4A54C8 0%,#7856BE 34%,#A65C93 62%,#C0785A 84%,#C79A55 100%)!important;
    background-image:linear-gradient(120deg,#4A54C8 0%,#7856BE 34%,#A65C93 62%,#C0785A 84%,#C79A55 100%)!important;
    -webkit-background-clip:border-box!important;background-clip:border-box!important;
    -webkit-text-fill-color:#fff!important;color:#fff!important;
    border:0!important;border-radius:999px!important;
    text-shadow:0 1px 1px rgba(8,10,40,.28)!important;
    box-shadow:0 8px 22px -12px rgba(104,24,248,.4)!important;
    font-family:'Manrope',system-ui,sans-serif!important;font-weight:800!important;letter-spacing:.22em!important;text-transform:uppercase!important;}
  .eyebrow .dot{display:inline-block!important;background:#fff!important;box-shadow:0 0 8px rgba(255,255,255,.85)!important;}
  /* Date & Time band labels gold */
  .when .label{color:#FDA71A!important;}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="frame" id="frame" data-screen-label="Featured Section (Subscribe)"><div class="bgfull"><img src="assets/cos-tex-hex.png" alt="" /></div><div class="cc-scaler">
      <!-- B&W canyon photography panel -->
      <div class="photo" id="photo">
        <img id="photoImg" alt="" src="assets/cos-tex-hex.png" />
      </div>

      <!-- Header: logo + webinar eyebrow -->
      <div class="header">
        <div class="logo" aria-label="Western Alternative Strategies">
          <span class="lockup" role="img" aria-label="Western Alternative Strategies"></span>
        </div>
        
      </div>

      <!-- Title -->
      <div class="title-wrap">
        <h1 class="title" id="title" data-field="title">
          From Deliverables to Recurring Revenue
        </h1>
        <p class="subtext" data-field="subtext">Join 12,000+ agency leaders on The Recurring Report — weekly growth teardowns, retainer playbooks, and automation templates, free every Tuesday.</p>
      </div>

    <a class="ccbtn" href="#">Deliver to My Inbox <span class="ar">→</span></a>
    </div>
    </div>
  </div>

  <!-- Auto-scale stage to viewport -->
  <script>
    (function(){
      const frame = document.getElementById('frame');
      const W = 1200, H = 627;
      function fit(){
        const vw = window.innerWidth, vh = window.innerHeight;
        const s = Math.min(vw / W, vh / H);
        frame.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>

  <!-- Builder live-update listener -->
  <script>
  (function(){
    function setText(sel, val, multiline){
      document.querySelectorAll(sel).forEach(el=>{
        if (multiline) el.innerHTML = String(val||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');
        else el.textContent = val||'';
      });
    }
    function setHtml(sel, html){
      document.querySelectorAll(sel).forEach(el=>{ el.innerHTML = html; });
    }
    function setBg(url){ ['#photoImg','.photo img','.bgfull img'].forEach(function(s){ document.querySelectorAll(s).forEach(function(img){ img.src=url; }); }); }
    function setPortrait(idx, url){
      const ports = document.querySelectorAll('.speaker .portrait');
      const p = ports[idx]; if (!p) return;
      p.innerHTML = '<img src="'+url+'" />';
    }
    // Dynamically position date band + speakers below the title
    function relayout(){
      const tw = document.querySelector('.title-wrap');
      const when = document.querySelector('.when');
      if (!tw || !when) return;
      const TITLE_TOP = 212; // matches CSS .title-wrap top
      const GAP_ABOVE_TITLE = 56;
      when.style.top = (TITLE_TOP - when.offsetHeight - GAP_ABOVE_TITLE) + 'px';
    }
    if (window.ResizeObserver){
      const ro = new ResizeObserver(()=>relayout());
      const tw = document.querySelector('.title-wrap');
      if (tw) ro.observe(tw);
    }
    window.addEventListener('load', relayout);
    setTimeout(relayout, 50);
    document.fonts && document.fonts.ready && document.fonts.ready.then(relayout);

    window.addEventListener('message', e=>{
      const d = e.data; if (!d || d.kind !== 'webinar-update') return;
      if (d.bgColor){ ['.frame','.photo','.bgfull'].forEach(function(sel){ var el=document.querySelector(sel); if(el) el.style.backgroundColor=d.bgColor; }); }
      if (d.bgOpacity!=null){ ['.photo','.bgfull'].forEach(function(sel){ var el=document.querySelector(sel); if(el) el.style.opacity=d.bgOpacity; }); }
      // Subscribe panel keeps its fixed headline — ignore broadcast title.
      requestAnimationFrame(relayout);
      if (d.eyebrow != null) setText('[data-field="eyebrow"]', d.eyebrow);
      if (d.date != null) setHtml('[data-field="date"]', '<span class="num">'+String(d.date).replace(/ /g,'&nbsp;')+'</span>');
      if (d.time != null) setHtml('[data-field="time"]', d.time);
      if (d.bg) setBg(d.bg);
      if (d.s1Role != null) setText('[data-field="s1-role"]', d.s1Role);
      if (d.s1Name != null) setHtml('[data-field="s1-name"]', d.s1Name);
      if (d.s1Title != null) setHtml('[data-field="s1-title"]', d.s1Title);
      if (d.s2Role != null) setText('[data-field="s2-role"]', d.s2Role);
      if (d.s2Name != null) setHtml('[data-field="s2-name"]', d.s2Name);
      if (d.s2Title != null) setHtml('[data-field="s2-title"]', d.s2Title);
      if (d.s1Photo) setPortrait(0, d.s1Photo);
      if (d.s2Photo) setPortrait(1, d.s2Photo);
      if (d.s3Name != null) setHtml('[data-field="s3-name"]', d.s3Name);
      if (d.s3Title != null) setHtml('[data-field="s3-title"]', d.s3Title);
      if (d.s3Photo) setPortrait(2, d.s3Photo);
      if (d.s4Name != null) setHtml('[data-field="s4-name"]', d.s4Name);
      if (d.s4Title != null) setHtml('[data-field="s4-title"]', d.s4Title);
      if (d.s4Photo) setPortrait(3, d.s4Photo);
      if (d.speakerCount != null){ var _sps=document.querySelectorAll('.speaker'); _sps.forEach((el,i)=>{ el.style.display=(i<d.speakerCount)?'':'none'; }); var _c=document.querySelector('.speakers'); if(_c){ if(d.speakerCount<=2){ _c.style.justifyContent='center'; _sps.forEach(el=>el.style.flex='0 0 auto'); } else { _c.style.justifyContent=''; _sps.forEach(el=>el.style.flex=''); } } }
    });
    window.parent && window.parent.postMessage({kind:'webinar-ready'}, '*');
  })();
  </script>
</body>
</html>
