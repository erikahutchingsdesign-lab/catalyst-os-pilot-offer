document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lor: #F1ECFF; max-width: 780px;\">A limited-scope pilot — not the full commercial product. Built through a joint venture with industry stakeholders, it’s now open to a hand-selected group of companies at a reduced introductory investment, where your feedback helps shape where the platform goes next.<\u002Fp>\n            <div style=\"display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px 28px; margin-top: 24px;\">\n              <div style=\"display: flex; align-items: baseline; gap: 12px;\">\n                <span style=\"font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 40px; font-weight: 600; color: #FFFFFF; letter-spacing: 0.5px;\">$5,500<\u002Fspan>\n                <span style=\"font-size: 14px; font-weight: 500; color: #FFE7C2;\">/ month × 3 months — $16,500 total pilot investment<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; align-items: center; gap: 9px; padding: 7px 14px; border-radius: 999px; background: rgba(109,40,217,0.14); border: 1px solid rgba(109,40,217,0.35);\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FDA71A\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7 V12 L15 14\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #FDA71A;\">3-month pilot phase<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- what the pilot includes -->\n            <div style=\"margin-top: 26px; font-family: 'Manrope', sans-serif; font-size: 11.5px; font-weight: 700; letter-spacing: 2.2px; text-transform: uppercase; color: #D6CBF4;\">What your pilot includes<\u002Fdiv>\n            <div class=\"hc-pilot-incl\" style=\"display: grid; grid-template-columns: 1.2fr auto 1fr auto 1fr; gap: 18px; align-items: center  font-size: 20px; font-weight: 800; color: #081A53; margin-top: 4px; line-height: 1.1;\">Enterprise OS<\u002Fdiv>\n          <\u002Fdiv>\n          \n          <div style=\"display: flex; flex-direction: column; gap: 2px; padding: 10px 18px; border-top: 1px solid rgba(8,26,83,0.07);\">\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: #99A2B6;\">Marketing Production Team<\u002Fspan>\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; color: #132A63;\">300–1,000+ people<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 2px; padding: 10px 18px; border-top: 1px solid rgba(8,26,83,0.07); background: linear-gradient(120deg, rgba(58,44,232,0.06), rgba(201,35,155,0.06));\">\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: #6D28D9;\">AI-Enabled Team<\u002Fspan>\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 16px; font-weight: 800; color: #3A2CE8;\">90–300 people<\u002Fspan>\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 10.5px; font-weight: 500; color: #8A93A8;\">vs 300–1,000+ traditional<\u002Fspan>\n          <\u002Fdiv>\n          \n          <div style=\"display: flex; flex-direction: column; gap: 2px; padding: 10px 18px; border-top: 1px solid rgba(8,26,83,0.07);\">\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: #99A2B6;\">Typical Active Clients<\u002Fspan>\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; color: #132A63;\">600–2,000+<\u002Fspan>\n          <\u002Fdiv>\n          \n          <div style=\"display: flex; flex-direction: column; gap: 2px; padding: 10px 18px; border-top: 1px solid rgba(8,26,83,0.07);\">\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: #99A2B6;\">Blended Hourly Rate<\u002Fspan>\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; color: #132A63;\">$225–$275/hr<\u002Fspan>\n          <\u002Fdiv>\n          \n          <div style=\"display: flex; flex-direction: column; gap: 2px; padding: 10px 18px; border-top: 1px solid rgba(8,26,83,0.07);\">\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: #99A2B6;\">Monthly Investment<\u002Fspan>\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; color: #132A63;\">$100K<\u002Fspan>\n          <\u002Fdiv>\n          \n          <div style=\"display: flex; flex-direction: column; gap: 2px; padding: 10px 18px; border-top: 1px solid rgba(8,26,83,0.07);\">\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: #99A2B6;\">Annual Investment<\u002Fspan>\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; color: #132A63;\">$1.2M<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 2px; padding: 12px 18px; border-top: 1px solid rgba(8,26,83,0.07); background: rgba(14,159,110,0.07);\">\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: #0E9F6E;\">Value Created<\u002Fspan>\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 800; color: #0E9F6E;\">$16.8M<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top: auto; text-align: center; background: linear-gradient(120deg,#FD7715,#FDA71A); padding: 12px 8px;\">\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 19px; font-weight: 800; color: #FFFFFF;\">14.0×<\u002Fspan>\n            <span style=\"font-family: 'Manrope', sans-serif; font-size: 10.5px; font-weight: 700; color: rgba(255,255,255,0.85); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 6px;\">ROI<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: 30px; padding-top: 26px; border-top: 1px solid rgba(255,255,255,0.12); display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px 40px;\">\n        <div>\n          <h3 style=\"font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 18px; color: #FFFFFF; margin: 0 0 8px;\">Annual Economic Value Created<\u002Fh3>\n          <p style=\"margin: 0; font-size: 13.5px; line-height: 1.6; color: #9FAAD0;\">Includes labor efficiency, increased production capacity, operational savings, faster delivery, and new recurring revenue opportunities.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'Manrope', sans-serif; font-size: 10.5px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: #FDA71A; margin-bottom: 10px;\">Value Created Includes<\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 7px;\">\n            <div style=\"display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px; color: #DCE3F5;\"><span style=\"flex: none; margin-top: 7px; width: 5px; height: 5px; border-radius: 50%; background: #FDA71A;\"><\u002Fspan>Labor savings<\u002Fdiv><div style=\"display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px; color: #DCE3F5;\"><span style=\"flex: none; margin-top: 7px; width: 5px; height: 5px; border-radius: 50%; background: #FDA71A;\"><\u002Fspan>Increased production capacity<\u002Fdiv><div style=\"display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px; color: #DCE3F5;\"><span style=\"flex: none; margin-top: 7px; width: 5px; height: 5px; border-radius: 50%; background: #FDA71A;\"><\u002Fspan>Reduced operational waste<\u002Fdiv><div style=\"display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px; color: #DCE3F5;\"><span style=\"flex: none; margin-top: 7px; width: 5px; height: 5px; border-radius: 50%; background: #FDA71A;\"><\u002Fspan>Faster project turnaround<\u002Fdiv><div style=\"display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px; color: #DCE3F5;\"><span style=\"flex: none; margin-top: 7px; width: 5px; height: 5px; border-radius: 50%; background: #FDA71A;\"><\u002Fspan>Additional recurring AI subscription revenue<\u002Fdiv><div style=\"display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px; color: #DCE3F5;\"><span style=\"flex: none; margin-top: 7px; width: 5px; height: 5px; border-radius: 50%; background: #FDA71A;\"><\u002Fspan>Assets can be repurposed in new ways<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- proprietary / IP disclosure -->\n  <div style=\"position: relative; z-index: 2; display: flex; justify-content: center; padding: 8px 46px 22px;\">\n    <p style=\"max-width: 820px; margin: 0; text-align: center; font-size: 11.5px; font-weight: 500; line-height: 1.6; color: #97A0B2; letter-spacing: 0.2px;\"><strong style=\"font-family: 'Manrope', sans-serif; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-size: 10.5px; color: #6D28D9;\">Proprietary &amp; Confidential — <\u002Fstrong>This platform is a preliminary proof-of-concept demonstration, independently developed and privately funded. It remains proprietary intellectual property during this demo phase, pending a mutual agreement on the path forward. Shared in confidence — please do not distribute.<\u002Fp>\n  <\u002Fdiv>\n\n  <footer style=\"position: relative; z-index: 2; text-align: center; padding: 0 0 26px; font-size: 12px; font-weight: 500; color: #97A0B2; letter-spacing: 0.4px;\">\n    Powered by Catalyst<span style=\"background:linear-gradient(120deg,#FDA71A,#FD5920,#C1229C);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;\">OS<\u002Fspan> · Confidential preview · Independently developed IP — not for distribution\n  <\u002Ffooter>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1100, &quot;height&quot;: 1240 },\n  &quot;projectName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;The New AI Marketing Deliverable Platform&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; },\n  &quot;videoUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; }\n}\">\nclass Component extends DCLogic {\n  // expanded = modal open; activeIndex = which demo is showing in the modal\n  state = { expanded: false, activeIndex: 0 };\n\n  // ---- demo list (placeholder url until real links are supplied) ----\n  demos() {\n    return [\n      { name: 'Platform Dashboard', url: 'demos/CatalystOS Interactive Laptop.dc.html', feats: ['Unified command center for the whole team', 'Launch every builder from one place', 'Track live client tools and activity', 'Runs the agency\\u2019s marketing operating system', 'Grows more valuable with every client'] },\n      { name: 'Campaign Event Graphics Builder', url: 'demos/event-graphics/Event Graphics Laptop.dc.html', feats: ['One brief becomes a full event campaign', 'Zoom banners, registration and replay graphics', 'LinkedIn posts, waiting-room screens, newsletters', 'Every asset auto-sized and instantly editable', 'Export-ready in minutes, not days'] },\n      { name: 'Post Builder', url: 'demos/Post Builder Laptop.dc.html', feats: ['Plan a year of company or individual posts, month-by-month', 'Write inline or generate copy with AI', 'Auto-design on-brand graphics', 'One-tap color, size and photo controls', 'Export to PDF/Word/PNG or push to HubSpot'] },\n    ];\n  }\n  count() { return this.demos().length; }\n\n  componentDidMount() {\n    this._esc = (e) => { if (e.key === 'Escape') this.close(); };\n    window.addEventListener('keydown', this._esc);\n\n    // Scale the 1440x900 modal app to its container width. The grid previews are\n    // static (no live app) — the app only mounts once the modal is opened.\n    this._fit = () => {\n      document.querySelectorAll('.hc-fit-inner').forEach((inner) => {\n        const box = inner.parentElement;\n        if (!box) return;\n        inner.style.transform = 'scale(' + (box.clientWidth / 1440) + ')';\n      });\n    };\n    this._fit();\n    this._wireCovers();\n    window.addEventListener('resize', this._fit);\n  }\n\n  // Opens the modal ONLY on an explicit click — no auto-open, no idle kiosk.\n  open(i) {\n    this.setState({ expanded: true, activeIndex: i });\n    requestAnimationFrame(() => this._fit && this._fit());\n  }\n  close() { this.setState({ expanded: false }); }\n\n  // Branded cover over the modal app until it finishes loading, so raw markup\n  // is never visible before the app hydrates.\n  _wireCovers() {\n    // Grid preview iframes: reveal each once it has loaded.\n    document.querySelectorAll('.hc-mini-box iframe').forEach((f) => {\n      if (f.dataset.wired) return;\n      f.dataset.wired = '1';\n      const box = f.closest('.hc-mini-box');\n      const cover = box && box.querySelector('.hc-cover');\n      const hide = () => { if (cover) cover.style.opacity = '0'; };\n      f.addEventListener('load', hide);\n      setTimeout(hide, 3000);\n    });\n    const mf = document.querySelector('.hc-modal-box iframe');\n    if (mf) {\n      const cover = mf.closest('.hc-modal-box').querySelector('.hc-cover');\n      if (this._lastModalSrc !== mf.src) {\n        this._lastModalSrc = mf.src;\n        if (cover) cover.style.opacity = '1';\n        const hide = () => { if (cover) cover.style.opacity = '0'; };\n        mf.addEventListener('load', hide, { once: true });\n        clearTimeout(this._mcTimer);\n        this._mcTimer = setTimeout(hide, 2600);\n      }\n    } else {\n      this._lastModalSrc = null;\n    }\n  }\n\n  componentDidUpdate() { requestAnimationFrame(() => { this._fit && this._fit(); this._wireCovers(); }); }\n\n  componentWillUnmount() {\n    if (this._esc) window.removeEventListener('keydown', this._esc);\n    if (this._fit) window.removeEventListener('resize', this._fit);\n  }\n\n  renderVals() {\n    const projectName = this.props.projectName || 'The New AI Marketing Deliverable Platform';\n    const videoUrl = (this.props.videoUrl || '').trim();\n\n    const grads = [\n      'linear-gradient(160deg,#5A78FF,#1921FE)',\n      'linear-gradient(160deg,#9B5CFF,#6818F8)',\n      'linear-gradient(160deg,#EC5AC8,#C1229C)',\n      'linear-gradient(160deg,#FF8A4A,#FD5920)',\n      'linear-gradient(160deg,#FFC24A,#FD9A15)',\n    ];\n    const baseApps = [\n      'Webinar Graphics Builder',\n      'Post Writer',\n      'Post Builder',\n      'Story Builder',\n      'Profile Builder',\n      'Fact Sheet Builder',\n      'Deck Builder',\n      'Commentary Builder',\n      'DDQ Builder',\n      'Brand Guide Builder',\n    ].map((name, i) => ({ name, n: i + 1, grad: grads[i % grads.length], li: ['Post Writer', 'Post Builder', 'Profile Builder'].includes(name) }));\n\n    const months = [1, 2, 3, 4, 5, 6].map((mo) => {\n      const clients = mo * 5;\n      const pilot = mo <= 3;\n      return {\n        label: 'Month ' + mo,\n        clients,\n        h: Math.round((clients / 30) * 100) + '%',\n        pilot,\n        barGrad: pilot\n          ? 'linear-gradient(180deg, #6818F8 0%, #C1229C 60%, #FD5920 100%)'\n          : 'linear-gradient(180deg, rgba(104,24,248,0.32) 0%, rgba(193,34,156,0.30) 60%, rgba(253,89,32,0.30) 100%)',\n        barShadow: pilot ? '0 12px 26px -14px rgba(104,24,248,0.6)' : 'none',\n        clientColor: pilot ? '#081A53' : '#8A93A8'\n      };\n    });\n\n    const demoList = this.demos();\n    const ai = this.state.activeIndex % demoList.length;\n    const demos = demoList.map((d, i) => ({\n      name: d.name,\n      url: d.url,\n      feats: d.feats || [],\n      previewUrl: d.url + (d.url.indexOf('?') === -1 ? '?static=1' : '&static=1'),\n      n: i + 1,\n      open: () => this.open(i),\n    }));\n\n    return {\n      unlocked: true,\n      locked: false,\n      baseApps,\n      months,\n\n      demos,\n      expandedOpen: this.state.expanded,\n      activeName: demoList[ai].name,\n      activeUrl: demoList[ai].url,\n      activeN: ai + 1,\n      collapse: () => this.close(),\n      stop: (e) => e.stopPropagation(),\n\n      projectName,\n      hasVideo: !!videoUrl,\n      noVideo: !videoUrl,\n      videoUrl,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
